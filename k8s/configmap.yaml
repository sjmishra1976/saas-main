apiVersion: v1
kind: ConfigMap
metadata:
  name: saas-config
  namespace: saas
data:
  NODE_ENV: "production"
  PORT: "4000"
  AUTH_REQUIRED: "true"
  AUTH0_ISSUER_BASE_URL: "https://YOUR_AUTH0_DOMAIN/"
  AUTH0_AUDIENCE: "https://YOUR_API_AUDIENCE"
  SERVICE_DOMAIN: "yourdomain.com"
  ENABLE_GKE_DEPLOY: "true"
  GCP_PROJECT_ID: "aiaas"
  GCP_REGION: "us-west1"
  GKE_CLUSTER_NAME: "vishu-aiaas"
  DEPLOY_WAIT_SECONDS: "180"
  N8N_DB_HOST: "n8n-postgres"
  N8N_DB_PORT: "5432"
  N8N_DB_NAME: "n8n"
  N8N_DB_USER: "n8n"
  SERVICE_ACTIVITY_INGEST_BASE_URL: "http://saas-api.saas.svc.cluster.local:4000"
  HEALTHCARE_PROVIDER_NAME: "Vishu HealthCare"
  APP_BASE_URL: "https://app.yourdomain.com"
  API_BASE_URL: "http://saas-api.saas.svc.cluster.local:4000"
  NEXT_PUBLIC_API_BASE_URL: "https://api.yourdomain.com"
