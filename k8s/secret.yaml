apiVersion: v1
kind: Secret
metadata:
  name: saas-secrets
  namespace: saas
type: Opaque
stringData:
  AUTH0_DOMAIN: "your-tenant.us.auth0.com"
  AUTH0_CLIENT_ID: "your-client-id"
  AUTH0_CLIENT_SECRET: "your-client-secret"
  AUTH0_SECRET: "replace-with-long-random-secret"
  MONGODB_URI: "mongodb+srv://user:pass@cluster.mongodb.net/saas_main"
  N8N_DB_PASSWORD: "replace-db-password"
  N8N_ENCRYPTION_KEY: "replace-32-char-min"
  SERVICE_ACTIVITY_INGEST_KEY: "replace-activity-ingest-key"
  GCP_SERVICE_ACCOUNT_KEY_JSON: |
    {"type":"service_account","project_id":"aiaas"}
